name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: check / fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  acceptance:
    name: acceptance / hello_arithmetic
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build n0
        run: cargo build --release -p neural0_kernel

      - name: Assemble hello_arithmetic
        run: ./target/release/n0 asm tests/programs/hello_arithmetic.n0asm -o /tmp/hello.n0b

      - name: Run and assert final stack
        run: |
          output=$(./target/release/n0 run /tmp/hello.n0b)
          echo "$output"
          echo "$output" | grep -q "Final stack: \[I64(5)\]"
